name: Release

# Builds the macOS DMG and Windows installer and publishes them to a GitHub
# Release. Triggered by pushing a version tag (e.g. `v0.1.1`), or manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build & release (e.g. v0.1.1). Must already exist.'
        required: true

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon runner -> arm64 DMG (install) + zip & latest-mac.yml (auto-update feed)
          - os: macos-14
            artifact: |
              release/*/*.dmg
              release/*/*.zip
              release/*/*.blockmap
              release/*/latest-mac.yml
          # x64 runner -> NSIS installer + latest.yml (auto-update feed)
          - os: windows-latest
            artifact: |
              release/*/*.exe
              release/*/*.blockmap
              release/*/latest.yml
    runs-on: ${{ matrix.os }}
    steps:
      # On manual dispatch, fail fast with a clear message if the tag doesn't
      # exist yet. Otherwise checkout just retries a failing git fetch 3x and
      # dies with a cryptic "git failed with exit code 1".
      - name: Verify tag exists (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag='${{ github.event.inputs.tag }}'
          if gh api "repos/${{ github.repository }}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag '${tag}' found — proceeding."
          else
            echo "::error::Tag '${tag}' does not exist in ${{ github.repository }}. Create and push it first: git tag ${tag} && git push origin ${tag}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the dispatch input tag when run manually, otherwise the pushed ref.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package (macOS — signed + notarized)
        if: runner.os == 'macOS'
        # --publish never: electron-builder only builds artifacts; the separate
        # "Publish release" job uploads them. Without this, electron-builder
        # tries to auto-publish on tag builds and fails on a missing GH_TOKEN.
        run: pnpm run build:icons && pnpm exec electron-vite build && pnpm exec electron-builder --mac --publish never
        env:
          # Developer ID cert (base64 .p12) + its password. electron-builder
          # imports it into a temp keychain and auto-discovers the identity.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization credentials (mac.notarize: true in package.json).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build and package (Windows — unsigned)
        if: runner.os == 'Windows'
        run: pnpm run build:icons && pnpm exec electron-vite build && pnpm exec electron-builder --win --publish never
        env:
          # No Windows code-signing cert configured; produce an unsigned
          # installer. SmartScreen warns on first launch — see RELEASE_NOTES.md.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: wTerm ${{ github.event.inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          make_latest: true
          # Recursive globs: upload-artifact preserves the release/<version>/
          # subdir, so the files land under artifacts/<version>/. The .zip,
          # .blockmap, and latest*.yml are the electron-updater feed — without
          # them in the release, installed apps can't discover this version.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/latest-mac.yml
            artifacts/**/latest.yml
