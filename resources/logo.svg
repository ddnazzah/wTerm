<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="wTerm">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#1A1B23"/>
      <stop offset="0.55" stop-color="#101117"/>
      <stop offset="1" stop-color="#08090E"/>
    </linearGradient>

    <radialGradient id="rim" cx="0.5" cy="0.2" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="0.7" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>

    <linearGradient id="strokeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B7F4CB"/>
      <stop offset="1" stop-color="#7BE0A0"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect width="1024" height="1024" rx="229" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="229" fill="url(#rim)"/>

  <!--
    Monogram "W" for Workspace.
    Four strokes meet at five vertices: T1, M1, T2, M2, T3.
    Square caps (cursor-block feel at the arm ends), round joins (clean turns at valleys/peak).
  -->
  <g filter="url(#glow)">
    <polyline
      points="186,240 348,748 512,396 676,748 838,240"
      fill="none"
      stroke="url(#strokeGrad)"
      stroke-width="98"
      stroke-linecap="square"
      stroke-linejoin="round"/>
  </g>

  <!-- Terminal "prompt baseline" + cursor block beneath the W -->
  <line x1="252" y1="824" x2="700" y2="824"
        stroke="#97EAB6" stroke-opacity="0.55" stroke-width="12"
        stroke-linecap="round"/>
  <rect x="724" y="780" width="76" height="88" rx="10" fill="#97EAB6"/>
</svg>
